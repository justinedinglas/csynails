<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celine Grace Sy Nails</title>
    <link rel="icon" href="/pusheen.png" />
    <link rel="apple-touch-icon" href="/pusheen.png" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #fdf8f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #loader h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300;
        font-size: 32px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #5a3e3a;
        margin: 0;
      }
      #loader h1 em {
        font-style: italic;
        color: #c9908a;
      }
      #loader .dots {
        display: flex;
        gap: 8px;
      }
      #loader .dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #e8b4ac;
        animation: loaderPulse 1.2s ease-in-out infinite;
      }
      #loader .dots span:nth-child(2) { animation-delay: 0.2s; }
      #loader .dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loaderPulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.4); }
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <h1>Celine Grace Sy <em>Nails</em></h1>
      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
